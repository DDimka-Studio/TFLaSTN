name: C++ CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-2022
            compiler: cl
            cxxflags: /EHsc
          - os: linux-x86
            runner: ubuntu-22.04
            compiler: g++
            cxxflags: -O2 -Wall
            arch: x86_64
          - os: linux-arm64
            runner: ubuntu-22.04
            compiler: g++
            cxxflags: -O2 -Wall
            arch: aarch64
          - os: macos-x86
            runner: macos-13
            compiler: clang++
            cxxflags: -O2 -Wall
            arch: x86_64
          - os: macos-arm64
            runner: macos-14
            compiler: clang++
            cxxflags: -O2 -Wall
            arch: arm64

    steps:
      - uses: actions/checkout@v3

      - name: Install build tools
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27'
          ninja-version: '1.11.1'

      - name: Install compiler (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc" ]]; then
            sudo apt-get update && sudo apt-get install -y gcc g++
            if [[ "${{ matrix.arch }}" == "aarch64" ]]; then
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            fi
          fi

      - name: CMake configure
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=${{ matrix.compiler }} \
                -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
                ${{ matrix.arch && format('-DCMAKE_SYSTEM_PROCESSOR={0}', matrix.arch) }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # **Updated to v4**
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binary
          path: TFLaSTN
