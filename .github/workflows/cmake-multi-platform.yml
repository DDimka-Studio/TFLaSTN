name: C++ CI

on:
  push:
    branches: [main]
  pull_request:

# Run all JavaScript actions on Node 24 (removes the deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (MSVC)
          - os: windows
            runner: windows-2022
            c_compiler: cl
            cxx_compiler: cl
            cxxflags: /EHsc

          # Linux x86‑64 (gcc)
          - os: linux-x86
            runner: ubuntu-22.04
            c_compiler: gcc
            cxx_compiler: g++
            cxxflags: -O2 -Wall
            arch: x86_64

          # Linux ARM64 (gcc)
          - os: linux-arm64
            runner: ubuntu-22.04
            c_compiler: gcc
            cxx_compiler: g++
            cxxflags: -O2 -Wall
            arch: aarch64

          # macOS x86‑64 (clang)
          - os: macos-x86
            runner: macos-13
            c_compiler: clang
            cxx_compiler: clang++
            cxxflags: -O2 -Wall
            arch: x86_64

          # macOS ARM64 (clang, Apple Silicon)
          - os: macos-arm64
            runner: macos-14
            c_compiler: clang
            cxx_compiler: clang++
            cxxflags: -O2 -Wall
            arch: arm64

    steps:
      - uses: actions/checkout@v3

      # --------------------------------------------------------------
      # Install CMake (v2 works on all runners) and Ninja (separate action)
      # --------------------------------------------------------------
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27'

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4   # official Ninja setup action
        with:
          version: '1.11.1'

      # --------------------------------------------------------------
      # Install extra cross‑toolchain on Linux when building for aarch64
      # --------------------------------------------------------------
      - name: Install cross‑compiler (Linux only)
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # --------------------------------------------------------------
      # CMake configuration
      # --------------------------------------------------------------
      - name: CMake configure
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
                -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }} \
                ${{ matrix.arch && format('-DCMAKE_SYSTEM_PROCESSOR={0}', matrix.arch) }}

      # --------------------------------------------------------------
      # Build
      # --------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release

      # --------------------------------------------------------------
      # Test (optional – requires CTest)
      # --------------------------------------------------------------
      - name: Test
        run: ctest --test-dir build --output-on-failure

      # --------------------------------------------------------------
      # Upload the compiled binary (use the current v4 of the action)
      # --------------------------------------------------------------
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binary
          path: TFLaSTN
